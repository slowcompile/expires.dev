name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.hash.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build (static, linux/amd64)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" -o dist/upload-linux-amd64 .

      - name: Compute checksum
        id: hash
        run: echo "sha=$(sha256sum dist/upload-linux-amd64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: upload-linux-amd64
          path: dist/upload-linux-amd64
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary
        uses: actions/download-artifact@v7
        with:
          name: upload-linux-amd64
          path: dist

      - name: Verify checksum
        run: echo "${{ needs.build.outputs.sha }}  dist/upload-linux-amd64" | sha256sum -c

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/upload-linux-amd64
          generate_release_notes: true